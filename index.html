<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gastos do Casamento</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #fce4ec, #e3f2fd);
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
}

input, button {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
}

button {
    background: #ec407a;
    color: white;
    border: none;
    cursor: pointer;
}

table {
    width: 100%;
}

th {
    background: #f8bbd0;
}

.total {
    text-align: right;
    font-size: 20px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <h1>💍 Gastos do Casamento</h1>

    <div class="card">
        <input id="desc" placeholder="Descrição">
        <input id="valor" type="number" placeholder="Valor">
        <button onclick="add()">Adicionar</button>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Descrição</th>
                    <th>Valor</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="lista"></tbody>
        </table>

        <div class="total">Total: R$ <span id="total">0</span></div>
    </div>
</div>

<script>
const API_KEY = $2a$10$H8/dbUWlIFxYwYbkKH/iwuYxlNFW1ycU9EmaWExCh7/XVeVCe1C3O;
const BIN_ID = 69fba166c0954111d8e82c4d;

let gastos = [];

// 🔄 Buscar dados da nuvem
async function carregar() {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
        headers: { "X-Master-Key": API_KEY }
    });

    const data = await res.json();
    gastos = data.record.gastos || [];
    render();
}

// 💾 Salvar na nuvem
async function salvar() {
    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            "X-Master-Key": API_KEY
        },
        body: JSON.stringify({ gastos })
    });
}

function add() {
    let desc = document.getElementById("desc").value;
    let valor = parseFloat(document.getElementById("valor").value);

    if (!desc || !valor) return alert("Preencha os campos");

    gastos.push({ desc, valor });
    salvar();
    render();
}

function remover(i) {
    gastos.splice(i, 1);
    salvar();
    render();
}

function render() {
    let lista = document.getElementById("lista");
    let total = 0;

    lista.innerHTML = "";

    gastos.forEach((g, i) => {
        total += g.valor;

        lista.innerHTML += `
        <tr>
            <td>${g.desc}</td>
            <td>R$ ${g.valor.toFixed(2)}</td>
            <td><button onclick="remover(${i})">Excluir</button></td>
        </tr>`;
    });

    document.getElementById("total").innerText = total.toFixed(2);
}

carregar();
</script>

</body>
</html>
